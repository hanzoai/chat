# Hanzo Chat Configuration
# https://docs.hanzo.ai/chat/configuration

version: 1.2.1
cache: true

# Custom interface configuration
interface:
  customWelcome: "Welcome to Hanzo Chat! Enjoy your AI-powered conversation experience."
  mcpServers:
    placeholder: 'MCP Servers'
  fileSearch: true
  privacyPolicy:
    externalUrl: 'https://hanzo.ai/privacy'
    openNewTab: true
  termsOfService:
    externalUrl: 'https://hanzo.ai/terms'
    openNewTab: true
    modalAcceptance: true
    modalTitle: "Terms of Service for Hanzo Chat"
    modalContent: |
      # Terms and Conditions for Hanzo Chat

      *Effective Date: February 18, 2024*

      Welcome to Hanzo Chat, the AI-powered conversation platform by Hanzo AI, available at https://chat.hanzo.ai. These Terms of Service ("Terms") govern your use of our website and the services we offer. By accessing or using the Website, you agree to be bound by these Terms and our Privacy Policy, accessible at https://hanzo.ai/privacy.

      ## 1. Ownership

      Upon purchasing a package from Hanzo Chat, you are granted the right to download and use the code for accessing an admin panel for Hanzo Chat. While you own the downloaded code, you are expressly prohibited from reselling, redistributing, or otherwise transferring the code to third parties without explicit permission from Hanzo AI.

      ## 2. User Data

      We collect personal data, such as your name, email address, and payment information, as described in our Privacy Policy. This information is collected to provide and improve our services, process transactions, and communicate with you.

      ## 3. Non-Personal Data Collection

      The Website uses cookies to enhance user experience, analyze site usage, and facilitate certain functionalities. By using the Website, you consent to the use of cookies in accordance with our Privacy Policy.

      ## 4. Use of the Website

      You agree to use the Website only for lawful purposes and in a manner that does not infringe the rights of, restrict, or inhibit anyone else's use and enjoyment of the Website. Prohibited behavior includes harassing or causing distress or inconvenience to any person, transmitting obscene or offensive content, or disrupting the normal flow of dialogue within the Website.

      ## 5. Governing Law

      These Terms shall be governed by and construed in accordance with the laws of the United States, without giving effect to any principles of conflicts of law.

      ## 6. Changes to the Terms

      We reserve the right to modify these Terms at any time. We will notify users of any changes by email. Your continued use of the Website after such changes have been notified will constitute your consent to such changes.

      ## 7. Contact Information

      If you have any questions about these Terms, please contact us at support@hanzo.ai.

      By using the Website, you acknowledge that you have read these Terms of Service and agree to be bound by them.

  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true

registration:
  socialLogins: ['openid', 'github', 'google', 'discord']

# Prepaid billing — money path. NO free local credits: startBalance is 0 so a
# new user has no spendable balance until they claim their $5 starter credit at
# billing.hanzo.ai (a real Commerce grant against their org). Each authenticated
# request is billed to the user's OWN Hanzo Cloud (hk-) key against their org's
# Commerce balance; the gate is Commerce-first and FAILS CLOSED (see
# api/models/balanceMethods.js + packages/api/src/endpoints/custom/hanzoCloudKey.ts).
# 1,000,000 tokenCredits = $1 USD. minBalance keeps the legacy local gate sane
# for any non-IAM/legacy path.
balance:
  enabled: true
  startBalance: 0
  creditExpiryDays: 30
  minBalance: 1000000

actions:
  allowedDomains:
    - "hanzo.ai"
    - "chat.hanzo.ai"
    - "api.hanzo.ai"
    - "google.com"

# Model endpoints
endpoints:
  # Hanzo Cloud -- primary endpoint with zen4 models
  # All models routed through api.hanzo.ai OpenAI-compatible gateway
  custom:
    - name: 'Hanzo'
      # Primary endpoint: order ahead of the built-in `agents` endpoint (order 1)
      # so a new conversation defaults to Hanzo (a working completion path that
      # carries the per-user hk- key) instead of bare `agents`, which needs an
      # explicit agent_id and 400s on the first send.
      customOrder: 0
      # Publishable key for unauthenticated users (rate-limited).
      # Authenticated users override with their own key via IAM (hanzo.id).
      apiKey: '${HANZO_API_KEY}'
      baseURL: 'https://api.hanzo.ai/v1'
      iconURL: 'https://hanzo.chat/assets/logo.svg'
      models:
        default:
          # Zen model family (Hanzo AI)
          - 'zen3-nano'
          - 'zen4-mini'
          - 'zen'
          - 'zen4-pro'
          - 'zen4'
          - 'zen4-max'
          - 'zen4-ultra'
          - 'zen4-thinking'
          - 'zen4-coder-flash'
          - 'zen4-coder'
          - 'zen4-coder-pro'
          # Third-party models (via Hanzo Cloud)
          - 'gpt-4o'
          - 'gpt-4o-mini'
          - 'claude-sonnet-4-5'
          - 'claude-haiku-4-5'
        fetch: false
      titleConvo: true
      titleModel: 'zen4-mini'
      summarize: true
      summaryModel: 'zen4-mini'
      modelDisplayLabel: 'Hanzo'
