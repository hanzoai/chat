apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: hanzo
  labels:
    app: chat
    app.kubernetes.io/managed-by: hanzo-universe
    app.kubernetes.io/name: chat
    app.kubernetes.io/part-of: hanzo-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat
      app.kubernetes.io/managed-by: hanzo-universe
      app.kubernetes.io/name: chat
      app.kubernetes.io/part-of: hanzo-platform
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: chat
        app.kubernetes.io/managed-by: hanzo-universe
        app.kubernetes.io/name: chat
        app.kubernetes.io/part-of: hanzo-platform
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: chat
          image: ghcr.io/hanzoai/chat:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3080
          # Static file server — simple TCP check
          livenessProbe:
            httpGet:
              path: /
              port: 3080
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3080
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
