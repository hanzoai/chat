    model_info:
      description: "zen4-ultra: 744B MoE + CoT reasoning"

  - model_name: zen4-thinking
    litellm_params:
      model: openai/zen4-thinking
      api_base: https://api.hanzo.ai/v1
      api_key: os.environ/HANZO_API_KEY
    model_info:
      description: "zen4-thinking: 80B MoE with chain-of-thought"

  - model_name: zen4-coder-flash
    litellm_params:
      model: openai/zen4-coder-flash
      api_base: https://api.hanzo.ai/v1
      api_key: os.environ/HANZO_API_KEY
    model_info:
      description: "zen4-coder-flash: 30B MoE, fast code specialist"

  - model_name: zen4-coder
    litellm_params:
      model: openai/zen4-coder
      api_base: https://api.hanzo.ai/v1
      api_key: os.environ/HANZO_API_KEY
    model_info:
      description: "zen4-coder: 480B MoE code specialist"

  - model_name: zen4-coder-pro
    litellm_params:
      model: openai/zen4-coder-pro
      api_base: https://api.hanzo.ai/v1
      api_key: os.environ/HANZO_API_KEY
    model_info:
      description: "zen4-coder-pro: 480B dense BF16 coding model"

  # =====================
  # Third-party models (via Hanzo Cloud)
  # =====================
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.hanzo.ai/v1
      api_key: os.environ/HANZO_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: https://api.hanzo.ai/v1
