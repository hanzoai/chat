# Hanzo Router Configuration
# Hanzo LLM proxy -- unified LLM gateway routing all models through api.hanzo.ai

model_list:
  # =====================
  # Zen model family (Hanzo AI)
  # Publishable key (HANZO_API_KEY) for unauthenticated users.
  # Authenticated users override with their own key via IAM (hanzo.id).
  # =====================
  - model_name: zen3-nano
    litellm_params:
      model: openai/zen3-nano
      api_base: https://api.hanzo.ai/v1
      api_key: os.environ/HANZO_API_KEY
    model_info:
      description: "zen3-nano: 4B dense, fast free-tier model"

  - model_name: zen4-mini
    litellm_params:
      model: openai/zen4-mini
      api_base: https://api.hanzo.ai/v1
