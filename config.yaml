      api_key: os.environ/HANZO_API_KEY
    model_info:
      description: "zen4: 744B MoE frontier model"

  - model_name: zen4-max
    litellm_params:
      model: openai/zen4-max
      api_base: https://api.hanzo.ai/v1
      api_key: os.environ/HANZO_API_KEY
