# Deployment managed by hanzoai/universe — this workflow only builds and pushes images.
# Build runs on the self-hosted arcd pools via the canonical reusable workflow;
# GHCR only (never Docker Hub); immutable sha-/semver tags only (no floating branch tag).
name: Docker Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/chat
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  dispatch-to-universe:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Compute image URI
        id: meta
        run: |
          IMAGE="ghcr.io/hanzoai/chat"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          else
            TAG="sha-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Dispatch image update to universe
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_DISPATCH_TOKEN }}
          repository: hanzoai/universe
          event-type: image-update
          client-payload: |
            {
              "service": "chat",
              "image": "${{ steps.meta.outputs.image }}",
              "sha": "${{ github.sha }}",
              "repo": "${{ github.repository }}"
            }

      - name: Summary
        run: |
          echo "### Image built & pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ steps.meta.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
