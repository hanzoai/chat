name: Test Chat Service

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

      meili:
        image: getmeili/meilisearch:latest
        env:
          MEILI_MASTER_KEY: test_master_key
        ports:
          - 7700:7700

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v5
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build workspace packages
      run: |
        pnpm run build:data-provider
        pnpm run build:data-schemas
        pnpm run build:api
        pnpm run build:client-package

    - name: Run API tests
      run: pnpm run test:api
      env:
        NODE_ENV: test
        MONGO_URI: mongodb://localhost:27017/librechat-test
        MEILI_HOST: http://localhost:7700
        MEILI_MASTER_KEY: test_master_key

    - name: Run client tests
      run: pnpm run test:client