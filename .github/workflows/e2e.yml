name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - 'api/**'
      - 'packages/**'
      - 'e2e/**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    if: github.event.pull_request.head.repo.full_name == 'hanzoai/chat'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      CI: true
      NODE_ENV: CI
      SEARCH: false
      MONGO_URI: mongodb://localhost:27017/librechat-test
      JWT_SECRET: e2e-test-jwt-secret
      JWT_REFRESH_SECRET: e2e-test-jwt-refresh-secret
      CREDS_KEY: e2e-test-creds-key-32chars00000000
      CREDS_IV: e2e-test-creds-iv-16c
      DOMAIN_CLIENT: http://localhost:3080
      DOMAIN_SERVER: http://localhost:3080
      ALLOW_REGISTRATION: true
      TITLE_CONVO: false

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm run frontend

      - name: Install Playwright
        run: |
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run e2e:ci

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
